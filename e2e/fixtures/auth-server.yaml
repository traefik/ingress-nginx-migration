apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-server-config
data:
  default.conf: |
    server {
        listen 80;
        location / {
            add_header X-Auth-User "authenticated-user" always;
            add_header X-Auth-Role "admin" always;
            add_header Set-Cookie "session=auth" always;
            add_header X-From-Request $http_x_from_request always;
            add_header X-Request-Method $request_method always;
            return 200 "auth ok";
        }
        location /deny {
            return 401 "unauthorized";
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-server
  template:
    metadata:
      labels:
        app: auth-server
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: config
          configMap:
            name: auth-server-config
---
apiVersion: v1
kind: Service
metadata:
  name: auth-server
spec:
  selector:
    app: auth-server
  ports:
    - port: 80
      targetPort: 80
