---
# Migrated from production Ingress with affinity: cookie + session-cookie-name: route,
# combined with a canary Ingress (canary: "true", canary-weight: 50) with no
# affinity-canary-behavior annotation. Default behavior is sticky.
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: gateway-affinity-canary-default-service
  namespace: default
spec:
  weighted:
    services:
      - name: backend
        port: 80
        weight: 50
      - name: canary-backend
        port: 80
        weight: 50
    sticky:
      cookie:
        name: route
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-affinity-canary-default
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - affinity-canary-default.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: traefik.io
          kind: TraefikService
          name: gateway-affinity-canary-default-service
