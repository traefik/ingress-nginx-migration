---
# Migrated from: custom-headers annotation
# custom-headers ConfigMap → ResponseHeaderModifier filter
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-custom-headers-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - custom-headers-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: X-Custom-Resp
                value: custom-response-value
              - name: X-Frame-Options
                value: DENY
              - name: X-More-Resp
                value: more-response-value
      backendRefs:
        - name: backend
          port: 80
