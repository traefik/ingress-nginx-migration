---
# Migrated: permanent-redirect: "https://example.com/new-home" → RequestRedirect 301
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-perm-redirect-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - perm-redirect-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: example.com
            path:
              type: ReplaceFullPath
              replaceFullPath: /new-home
            statusCode: 301
