---
# Migrated: temporal-redirect: "https://example.com/temp" → RequestRedirect 302
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-temp-redirect-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - temp-redirect-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: example.com
            path:
              type: ReplaceFullPath
              replaceFullPath: /temp
            statusCode: 302
