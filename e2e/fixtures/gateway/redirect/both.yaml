---
# Migrated: both permanent-redirect + temporal-redirect
# Temporal takes precedence → RequestRedirect 302 to temporal URL
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-both-redirect-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - both-redirect-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: example.com
            path:
              type: ReplaceFullPath
              replaceFullPath: /temporal
            statusCode: 302
