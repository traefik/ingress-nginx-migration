---
# Migrated from ingress-nginx forward auth with signin redirect.
# nginx.ingress.kubernetes.io/auth-url: "http://auth-server.default.svc.cluster.local/deny"
# nginx.ingress.kubernetes.io/auth-signin: "https://login.example.com/oauth2/start"
#
# MIGRATION GAP: Traefik's forwardAuth middleware does not have a direct equivalent
# for the nginx auth-signin annotation. The auth-signin annotation causes nginx to
# redirect the client to the signin URL when the auth service returns 4xx. With
# Traefik's forwardAuth, the 401/403 response from the auth service is forwarded
# directly to the client , no automatic redirect to a signin page is performed.
# To replicate this behavior, the auth service itself must issue a 302 redirect,
# or an additional middleware (e.g. errors middleware) must be configured to
# handle 401 responses and redirect accordingly.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gateway-forward-auth-signin-test-forwardauth
  namespace: default
spec:
  forwardAuth:
    address: "http://auth-server.default.svc.cluster.local/deny"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-forward-auth-signin-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - forward-auth-signin-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: gateway-forward-auth-signin-test-forwardauth
      backendRefs:
        - name: backend
          port: 80
