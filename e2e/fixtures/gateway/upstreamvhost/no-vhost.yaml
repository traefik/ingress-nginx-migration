---
# Plain HTTPRoute with no upstream-vhost override.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-no-vhost-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - no-vhost-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 80
