---
# Migrated from: upstream-vhost: "custom.backend.internal"
# upstream-vhost → URLRewrite filter with hostname (NOT RequestHeaderModifier)
# Traefik ignores Host header modifications via RequestHeaderModifier.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-upstream-vhost-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - upstream-vhost-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            hostname: custom.backend.internal
      backendRefs:
        - name: backend
          port: 80
