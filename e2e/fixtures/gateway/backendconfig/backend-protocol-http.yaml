---
# backend-protocol: HTTP is the default; plain HTTPRoute used.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-backend-protocol-http-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - backend-protocol-http-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 80
