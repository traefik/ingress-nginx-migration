---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gateway-full-path-test-redirect
  namespace: default
spec:
  redirectRegex:
    regex: "^https?://[^/]+/original.*"
    replacement: "https://bar.example.org/"
    permanent: false
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-full-path-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - full-path-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /original
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: gateway-full-path-test-redirect
      backendRefs:
        - name: backend
          port: 80
