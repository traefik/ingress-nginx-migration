---
# MIGRATION GAP - per-route timeouts not supported in Traefik Gateway API provider.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-timeout-short-read-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - timeout-short-read-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 80
