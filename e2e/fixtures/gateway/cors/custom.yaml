---
# Migrated from CORS Ingress with custom settings
# enable-cors + cors-* → Traefik Headers Middleware CRD
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gateway-cors-test-cors
  namespace: default
spec:
  headers:
    accessControlAllowCredentials: true
    accessControlAllowHeaders:
      - Content-Type
      - Authorization
      - X-Request-ID
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
    accessControlAllowOriginList:
      - https://app.example.com
    accessControlExposeHeaders:
      - X-Request-ID
      - X-Trace-ID
    accessControlMaxAge: 7200

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-cors-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - cors-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: gateway-cors-test-cors
      backendRefs:
        - name: backend
          port: 80
