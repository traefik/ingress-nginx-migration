---
# Migrated from CORS Ingress with credentials explicitly disabled
# enable-cors + cors-allow-origin + cors-allow-credentials: "false"
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gateway-cors-no-creds-test-cors
  namespace: default
spec:
  headers:
    accessControlAllowCredentials: false
    accessControlAllowOriginList:
      - https://app.example.com

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-cors-no-creds-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - cors-no-creds-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: gateway-cors-no-creds-test-cors
      backendRefs:
        - name: backend
          port: 80
