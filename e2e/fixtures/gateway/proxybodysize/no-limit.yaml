---
# proxy-body-size: "0" means unlimited; no buffering middleware needed.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-body-no-limit-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - body-no-limit-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 80
