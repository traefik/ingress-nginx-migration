---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gateway-body-limit-mb-test-bodylimit
  namespace: default
spec:
  buffering:
    maxRequestBodyBytes: 1048576

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-body-limit-mb-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - body-limit-mb-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: gateway-body-limit-mb-test-bodylimit
      backendRefs:
        - name: backend
          port: 80
