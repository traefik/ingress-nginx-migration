---
# proxy-body-size maps to Traefik's buffering middleware (maxRequestBodyBytes).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: retry-body-limit-1k
  namespace: default
spec:
  buffering:
    maxRequestBodyBytes: 1024
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-retry-body-limit-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - retry-body-limit-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: retry-body-limit-1k
      backendRefs:
        - name: backend
          port: 80
