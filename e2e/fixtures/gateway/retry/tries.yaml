---
# proxy-next-upstream has no direct Gateway API equivalent.
# Plain HTTPRoute without retry middleware.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-retry-tries-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - retry-tries-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 80
