---
# Migrated from: force-ssl-redirect: "true"
# RequestRedirect filter unconditionally redirects HTTP to HTTPS.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-ssl-redirect-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - ssl-redirect-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
