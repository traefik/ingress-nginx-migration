---
# Migrated from: ssl-redirect: "false"
# No redirect: plain HTTPRoute pointing at the backend.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-ssl-no-redirect-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - ssl-no-redirect-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 80
