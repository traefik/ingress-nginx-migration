---
# Migrated: allowlist-source-range: "192.0.2.0/24" (takes precedence over whitelist-source-range)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gateway-allowlist-precedence-test-ipallow
  namespace: default
spec:
  ipAllowList:
    sourceRange:
      - "192.0.2.0/24"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-allowlist-precedence-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - allowlist-precedence-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: gateway-allowlist-precedence-test-ipallow
      backendRefs:
        - name: backend
          port: 80
