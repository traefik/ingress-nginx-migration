---
# Migrated from ingress-nginx limit-rps: "1"
# burst = limit-rps * limit-burst-multiplier (default 5) = 1 * 5 = 5
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gateway-ratelimit-rps-exceed-test-ratelimit
  namespace: default
spec:
  rateLimit:
    average: 1
    burst: 5
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-ratelimit-rps-exceed-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - ratelimit-rps-exceed-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: gateway-ratelimit-rps-exceed-test-ratelimit
      backendRefs:
        - name: backend
          port: 80
