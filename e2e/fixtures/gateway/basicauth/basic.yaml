---
# Migrated from: auth-type: basic + auth-secret: basic-auth + auth-realm: "Test Realm"
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gateway-basic-auth-test-auth
  namespace: default
spec:
  basicAuth:
    secret: basic-auth
    realm: "Test Realm"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-basic-auth-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - basic-auth-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: gateway-basic-auth-test-auth
      backendRefs:
        - name: backend
          port: 80
