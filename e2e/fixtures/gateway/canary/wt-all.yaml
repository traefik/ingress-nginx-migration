---
# Migrated from: canary: "true" + canary-weight: 100
# 100% of traffic goes to the canary backend (weighted backendRefs on a single rule).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-canary-wt-all
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - canary-wt-all.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 80
          weight: 0
        - name: canary-backend
          port: 80
          weight: 100
