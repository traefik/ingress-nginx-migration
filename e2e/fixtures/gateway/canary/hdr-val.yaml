---
# Migrated from: canary: "true" + canary-by-header: X-Canary + canary-by-header-value: route-to-canary
# Exact value match -> canary; anything else -> production.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-canary-hdr-val
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - canary-hdr-val.gateway.local
  rules:
    # Exact value match -> canary
    - matches:
        - path:
            type: PathPrefix
            value: /
          headers:
            - name: X-Canary
              value: route-to-canary
      backendRefs:
        - name: canary-backend
          port: 80
    # Default -> production
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 80
