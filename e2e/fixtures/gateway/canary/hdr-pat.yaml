---
# Migrated from: canary: "true" + canary-by-header: X-Canary + canary-by-header-pattern: "^(lab|staging)$"
# MIGRATION GAP: Gateway API supports RegularExpression header matching, but the
# Traefik Gateway API provider does not implement it. This fixture approximates
# the pattern using exact matches for the known values "lab" and "staging".
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-canary-hdr-pat
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - canary-hdr-pat.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
          headers:
            - name: X-Canary
              value: lab
      backendRefs:
        - name: canary-backend
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
          headers:
            - name: X-Canary
              value: staging
      backendRefs:
        - name: canary-backend
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 80
