---
# Migrated from: canary: "true" + canary-by-header: X-Canary + canary-weight: 100
# Header match takes precedence over weight; absent header falls back to the
# weighted split (100% canary in this scenario).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-canary-hdr-wt
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - canary-hdr-wt.gateway.local
  rules:
    # X-Canary: always -> canary
    - matches:
        - path:
            type: PathPrefix
            value: /
          headers:
            - name: X-Canary
              value: always
      backendRefs:
        - name: canary-backend
          port: 80
    # X-Canary: never -> production
    - matches:
        - path:
            type: PathPrefix
            value: /
          headers:
            - name: X-Canary
              value: never
      backendRefs:
        - name: backend
          port: 80
    # No matching header: weight-based (100% canary).
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 80
          weight: 0
        - name: canary-backend
          port: 80
          weight: 100
