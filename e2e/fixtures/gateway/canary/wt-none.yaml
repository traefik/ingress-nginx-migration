---
# Migrated from: canary: "true" + canary-weight: 0
# 0% of traffic goes to the canary backend (all traffic to production).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-canary-wt-none
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - canary-wt-none.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 80
          weight: 100
        - name: canary-backend
          port: 80
          weight: 0
