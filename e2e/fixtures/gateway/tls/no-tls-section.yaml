---
# Migrated from: Ingress with no .spec.tls section
# In Gateway API, TLS is configured at the Gateway listener level, not per-route.
# This HTTPRoute simply routes traffic; TLS termination is handled by the Gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-no-spec-tls-section
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - no-spec-tls-section.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 80
