---
# Migrated from: Ingress with invalid TLS secret
# In Gateway API, TLS secrets are referenced at the Gateway listener level.
# An invalid or missing secret has no effect on HTTPRoute routing.
# This is a plain HTTPRoute: the TLS secret concept does not translate per-route.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-invalid-tls-secret
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - invalid-tls-secret.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 80
