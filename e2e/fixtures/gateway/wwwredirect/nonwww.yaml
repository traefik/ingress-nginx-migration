---
# Migrated from: from-to-www-redirect on non-www host
# MIGRATION GAP: Original uses 308, redirectRegex only supports 301/302
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gateway-wwwredir-nonwww-test-redirect
  namespace: default
spec:
  redirectRegex:
    regex: "^https?://www\\.wwwredir-nonwww-test\\.gateway\\.local(.*)"
    replacement: "http://wwwredir-nonwww-test.gateway.local${1}"
    permanent: true
---
# Primary route: serves traffic normally
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-wwwredir-nonwww-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - wwwredir-nonwww-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 80
---
# Redirect route: www -> non-www
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-wwwredir-nonwww-test-redirect
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - www.wwwredir-nonwww-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: gateway-wwwredir-nonwww-test-redirect
      backendRefs:
        - name: backend
          port: 80
