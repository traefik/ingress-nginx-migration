---
# Migrated from session affinity Ingress with extended settings:
#   session-cookie-name: EXTSESSION
#   session-cookie-domain: .example.com    (MIGRATION GAP: not emitted)
#   session-cookie-expires: "172800"       (mapped to maxAge in seconds)
# MIGRATION GAP: Traefik's sticky cookie does not expose a domain attribute,
# so session-cookie-domain is silently dropped during migration.
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: gateway-affinity-extended-test-sticky
  namespace: default
spec:
  weighted:
    services:
      - name: backend
        port: 80
        weight: 1
    sticky:
      cookie:
        name: EXTSESSION
        maxAge: 172800
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-affinity-extended-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - affinity-extended-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: traefik.io
          kind: TraefikService
          name: gateway-affinity-extended-test-sticky
