---
# upstream-hash-by has no Gateway API equivalent; consistent hashing is a load balancer feature.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-no-upstream-hash-by-test
  namespace: default
spec:
  parentRefs:
    - name: traefik
  hostnames:
    - no-upstream-hash-by-test.gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 80
