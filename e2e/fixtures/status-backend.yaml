apiVersion: v1
kind: ConfigMap
metadata:
  name: status-backend-config
data:
  default.conf: |
    server {
        listen 80;
        location / {
            default_type text/plain;
            return 200 "status backend OK";
        }
        location /not-found {
            default_type text/plain;
            return 404 "not found from upstream";
        }
        location /unavailable {
            default_type text/plain;
            return 503 "service unavailable from upstream";
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: status-backend
  template:
    metadata:
      labels:
        app: status-backend
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: config
        configMap:
          name: status-backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: status-backend
spec:
  selector:
    app: status-backend
  ports:
  - port: 80
    targetPort: 80
