apiVersion: v1
kind: ConfigMap
metadata:
  name: error-backend-config
data:
  default.conf: |
    server {
        listen 80;
        location / {
            default_type text/plain;
            return 200 "custom error page";
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: error-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: error-backend
  template:
    metadata:
      labels:
        app: error-backend
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: config
        configMap:
          name: error-backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: error-backend
spec:
  selector:
    app: error-backend
  ports:
  - port: 80
    targetPort: 80
